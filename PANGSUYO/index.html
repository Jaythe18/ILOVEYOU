<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Portrait using CSS</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <!-- The script generates a large amount of repeating text within this paragraph -->
    <p id="iloveyou"></p>

    <script>
        let str = "iloveyouiloveyouiloveyouiloveyouiloveyouiloveyouiloveyouiloveyouiloveyouiloveyouiloveyouiloveyouiloveyou "; // Replace with your desired text/lyrics
        document.getElementById("iloveyou").innerHTML = str.repeat(500); // Repeats the text many times
    </script>
</body>
</html>
